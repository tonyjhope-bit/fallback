<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Countdown — Static Background</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Denton', sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    background: black;
  }

  body {
    background: url('./KEY Visual End VIdeo.jpg') no-repeat center center;
    background-size: cover;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

.headline {

  font-size: 6vw;

  font-weight: bold;

  text-shadow:

    0 4px 14px rgba(0,0,0,0.8),

    0 0 25px rgba(255,255,255,0.35);

    

  margin-bottom: 1.5rem;

  padding: 0 5vw;

  line-height: 1.1;

}

.countdown {

  font-size: 8vw;

  font-weight: bold;

  letter-spacing: 0.08em;

  text-shadow:

    0 4px 16px rgba(0,0,0,0.9),

    0 0 30px rgba(255,255,255,0.4);

  padding: 0.4em 0.8em;

  border-radius: 20px;

  background: rgba(0,0,0,0.25);

  backdrop-filter: blur(4px);

}

/* Mobile */

@media (max-width: 768px) {

  .headline {

    font-size: 10vw;

    padding: 0 8vw;

  }

  .countdown {

    font-size: 12vw;

  }

}
</style>
</head>
<body>
  <div class="container">
    <div class="headline">This experience will launch in:</div>
    <div class="countdown" id="countdown"></div>
  </div>

  <script>
    function updateCountdown() {
      const target = new Date("May 26, 2026 09:00:00 GMT+0200");
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById("countdown").textContent = "The time has come!";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").textContent =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>

</html>
